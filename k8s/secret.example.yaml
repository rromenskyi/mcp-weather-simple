# Template for the Bearer token Secret consumed by the Deployment.
#
# Do NOT commit a real token. Generate one and apply out-of-band, e.g.:
#
#   TOKEN=$(openssl rand -hex 32)
#   kubectl -n ai create secret generic mcp-weather-auth \
#     --from-literal=token="$TOKEN"
#
# Then share the same $TOKEN with the MCP client (Open WebUI, mcphost, etc.)
# as "Authorization: Bearer $TOKEN".
#
# If you prefer to declare the Secret in YAML, copy this file to
# `secret.yaml`, fill in the value, and add it to kustomization.yaml.
# secret.yaml is gitignored.
apiVersion: v1
kind: Secret
metadata:
  name: mcp-weather-auth
  namespace: ai
type: Opaque
stringData:
  token: REPLACE_ME_WITH_A_RANDOM_TOKEN
