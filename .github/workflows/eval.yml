name: eval tool-calling

# Integration test: pull a real Ollama model, attach the MCP tool
# catalog, walk `tests/integration/cases.yaml`, score tool-selection
# accuracy. Lives separately from the main `build` workflow because:
#
#   - Each model takes ~10-15 min on the 2-vCPU GHA runner (2-4 tok/s
#     inference, amortised over 40 prompts and a ~5 GB initial pull).
#   - It's not on the hot path: a failing tool-selection score is a
#     signal to re-tune tool docstrings / descriptions, not a blocker
#     for shipping code changes.
#
# Triggers:
#   - `workflow_dispatch`: manual button in the Actions tab. By default
#     runs the full matrix (qwen3.5:9b + qwen3:14b, in parallel); an
#     optional `model` input picks a single model for quick iteration.
#   - `schedule`: one nightly run at 03:00 UTC across the matrix to
#     catch regressions over time. The two runners fan out in parallel
#     so wall-clock is bounded by the slower model, not the sum.
#
# Usage guard: GitHub's Additional Product Terms allow Actions for
# "testing of the software project", which this clearly is. Matrix of
# two ~15-min jobs once a day = ~0.5 CPU-hours — well inside anyone's
# definition of proportional.

on:
  workflow_dispatch:
    inputs:
      model:
        description: >-
          Single model to evaluate (overrides the default matrix).
          Leave empty to run qwen3.5:9b + qwen3:14b in parallel.
        required: false
        default: ''
        type: choice
        options:
          - ''
          - qwen3.5:9b
          - qwen3:14b
          - qwen3:8b
          - qwen2.5:7b
          - qwen2.5:14b
          - llama3.1:8b
          - llama3.2:3b
      output_schema:
        description: >-
          outputSchema A/B experiment. Off = current (no spec 2025-06-18
          outputSchema declared); on = every tool advertises the
          envelope schema; both = fan out matrix to run each model
          twice (on + off) so per-family hit-rate deltas and latency
          deltas are visible on the same PR.
        required: false
        default: 'off'
        type: choice
        options:
          - 'off'
          - 'on'
          - 'both'
      chunk_count:
        description: >-
          Shard the ~44-prompt suite across N parallel runners.
          Case counts per chunk and approximate 14b wall-clock on
          the 2-vCPU GHA runner (with the bumped 480 s per-request
          timeout allowing worst-case prefill tails):
            1 — ~44 cases / row, > 45 min ceiling, does NOT fit.
            2 — ~22 cases / row, ~30-40 min, tight on 14b.
            4 — ~11 cases / row, ~18-25 min, comfortable.
            6 — ~8  cases / row, ~13-18 min, comfortable.
            8 — ~6  cases / row, ~10-15 min, safest.
          Fanout with output_schema=both + docstrings=both stays
          under the 20-concurrent-job free-tier cap up to 4 chunks
          (2×2×2×4 = 32 → queues partially). At 8 chunks keep
          schema/docstring axes at a single value.
        required: false
        default: '4'
        type: choice
        options:
          - '1'
          - '2'
          - '4'
          - '6'
          - '8'
      docstrings:
        description: >-
          Docstring verbosity A/B. Terse = current (CPU-friendly,
          ~3000 tokens total); verbose = pre-trim pre-2026-04-21
          shape on find_place_coordinates, search_places,
          resolve_address (~3500 tokens, richer edge-case
          guidance). both = fan matrix across both modes. Worst-
          case fanout combined with output_schema=both + chunk=4
          is 2 × 2 × 2 × 4 = 32 rows — over the 20-concurrent-job
          cap. Queue up gracefully; if that bites, drop chunk to
          2 (→ 16 rows).
        required: false
        default: 'terse'
        type: choice
        options:
          - 'terse'
          - 'verbose'
          - 'both'
      runs_on:
        description: >-
          Which runner pool to use. `github-hosted` (default) is
          ubuntu-latest on GitHub's 2-vCPU hosted tier — fine for
          llama3.2:3b-scale but qwen3.5:9b+ blow the per-request
          timeout on prefill. `self-hosted` routes to a VM labelled
          `self-hosted,eval-runner` — e.g. the L4 GPU runner spun up
          via terraform-gcp-eval-runner with `mode = "agent"`. That
          cuts prefill to <5s and a 44-case eval from 40+min to ~5.
          Scheduled cron runs always stay on github-hosted (this
          input is only read on workflow_dispatch).
        required: false
        default: 'github-hosted'
        type: choice
        options:
          - 'github-hosted'
          - 'self-hosted'
      router_mode:
        description: >-
          `off` — 28 narrow @mcp.tool s, catalog ~6800 tokens (baseline).
          `fat_tools` — 4 fat domain-tools (weather/geo/knowledge/web)
          dispatching via `action` + named kwargs, catalog ~2250 tokens.
          `fat_tools_lean` (default) — 4 fat tools with signature
          `(action, params={})`, drops the pydantic nullability shell
          on optional kwargs, catalog ~1350 tokens (-78% vs off).
          Eval scorer rewrites `expected_tool` to `fat(action)` form
          for both fat variants so the same cases.yaml scores all three.
          Use to A/B the prefill-cost vs tool-picking-reliability
          tradeoff on a given model.
        required: false
        default: 'off'
        type: choice
        options:
          - 'off'
          - 'fat_tools'
          - 'fat_tools_lean'
  schedule:
    # 03:00 UTC every day. Runs the full default matrix (both 7b and
    # 14b) so nightly trend data covers both sizes. Schedule uses the
    # default `output_schema=off` so nightly-trend numbers stay
    # comparable over time — flip to `on`/`both` via workflow_dispatch
    # when you want to measure the experiment.
    - cron: "0 3 * * *"

# Concurrency lock is per (model × schema) — chunk index is NOT in
# the key so two re-runs of the same (model, schema) combo can't
# stack up, but (7b,off) runs independently from (14b,on) etc.
concurrency:
  group: >-
    eval-tool-calling-${{ github.event.inputs.model || 'matrix' }}-${{ github.event.inputs.output_schema || 'off' }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  plan:
    # Compute the matrix dynamically on TWO axes:
    #   - model      → which Ollama model to pull (workflow_dispatch
    #                  picker or default 7b+14b)
    #   - schema     → the outputSchema A/B experiment dimension
    #                  (off/on/both); `both` fans out so per-row
    #                  deltas are visible on the same PR
    # Total fanout is |models| × |schemas| parallel jobs. Each gets
    # its own GHA runner so wall-clock is bounded by the slowest row,
    # not the sum.
    runs-on: ubuntu-latest
    outputs:
      models: ${{ steps.pick.outputs.models }}
      schemas: ${{ steps.pick.outputs.schemas }}
      chunks: ${{ steps.pick.outputs.chunks }}
      chunk_count: ${{ steps.pick.outputs.chunk_count }}
      docstrings: ${{ steps.pick.outputs.docstrings }}
      runs_on: ${{ steps.pick.outputs.runs_on }}
      router_mode: ${{ steps.pick.outputs.router_mode }}
    steps:
      - id: pick
        run: |
          single='${{ github.event.inputs.model }}'
          if [ -n "$single" ]; then
            echo "models=[\"$single\"]" >> "$GITHUB_OUTPUT"
          else
            echo 'models=["qwen3.5:9b","qwen3:14b"]' >> "$GITHUB_OUTPUT"
          fi
          # Runner pool. Empty on schedule events (workflow_dispatch
          # input isn't populated) → default to github-hosted.
          runs_on='${{ github.event.inputs.runs_on || 'github-hosted' }}'
          echo "runs_on=$runs_on" >> "$GITHUB_OUTPUT"
          # Router mode. Same schedule-default handling.
          router_mode='${{ github.event.inputs.router_mode || 'off' }}'
          echo "router_mode=$router_mode" >> "$GITHUB_OUTPUT"
          schema='${{ github.event.inputs.output_schema || 'off' }}'
          if [ "$schema" = "both" ]; then
            echo 'schemas=["off","on"]' >> "$GITHUB_OUTPUT"
          else
            echo "schemas=[\"$schema\"]" >> "$GITHUB_OUTPUT"
          fi
          docstrings='${{ github.event.inputs.docstrings || 'terse' }}'
          if [ "$docstrings" = "both" ]; then
            echo 'docstrings=["terse","verbose"]' >> "$GITHUB_OUTPUT"
          else
            echo "docstrings=[\"$docstrings\"]" >> "$GITHUB_OUTPUT"
          fi
          # Chunk count defaults to 2 (schedule default + explicit).
          # Build the indices array inline so the eval job can use it
          # straight via fromJSON with matrix expansion.
          count='${{ github.event.inputs.chunk_count || '4' }}'
          case "$count" in
            1) echo 'chunks=["0"]' >> "$GITHUB_OUTPUT" ;;
            2) echo 'chunks=["0","1"]' >> "$GITHUB_OUTPUT" ;;
            4) echo 'chunks=["0","1","2","3"]' >> "$GITHUB_OUTPUT" ;;
            6) echo 'chunks=["0","1","2","3","4","5"]' >> "$GITHUB_OUTPUT" ;;
            8) echo 'chunks=["0","1","2","3","4","5","6","7"]' >> "$GITHUB_OUTPUT" ;;
            *) echo "Unsupported chunk_count=$count" >&2 ; exit 1 ;;
          esac
          echo "chunk_count=$count" >> "$GITHUB_OUTPUT"

  eval:
    needs: plan
    name: eval / ${{ matrix.model }} / outputSchema=${{ matrix.schema }} / docs=${{ matrix.docstring }} / chunk ${{ matrix.chunk }}
    # Dynamic runner selection. `plan.runs_on` resolves to
    # "github-hosted" by default (also what schedule events get —
    # `workflow_dispatch.inputs` is absent there) or "self-hosted"
    # when the manual trigger picks that. The expression returns a
    # list when self-hosted so GHA ANDs the labels (`self-hosted` +
    # `eval-runner`) — the VM registered by terraform-gcp-eval-runner
    # with mode=agent advertises both.
    runs-on: ${{ (needs.plan.outputs.runs_on == 'self-hosted') && fromJSON('["self-hosted","eval-runner"]') || 'ubuntu-latest' }}
    # Generous but bounded. With the default chunk_count=4 each row
    # runs ~11 cases; worst-case 14b × 480 s timeout × 11 = 88 min
    # ceiling in theory, but typical case is ~60-90 s so real
    # wall-clock is ~20 min. chunk_count=8 safely covers even 14b
    # pathological outliers. chunk_count=1 no longer fits the 45-min
    # per-row cap after the catalog grew and the per-request timeout
    # was bumped — use 2+.
    timeout-minutes: 45
    strategy:
      # A single row failure shouldn't cancel its siblings — we want
      # the other axis's numbers even if one regressed badly.
      fail-fast: false
      matrix:
        model: ${{ fromJSON(needs.plan.outputs.models) }}
        schema: ${{ fromJSON(needs.plan.outputs.schemas) }}
        chunk: ${{ fromJSON(needs.plan.outputs.chunks) }}
        docstring: ${{ fromJSON(needs.plan.outputs.docstrings) }}

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          # Cache is pointless on the self-hosted L4 — uv's cache
          # already lives on the persistent disk, and the Post step
          # (`@v5`'s cache save) was failing with exit 2 against that
          # layout. github-hosted runners keep caching for the 5-10 s
          # speedup on cold boots.
          enable-cache: ${{ needs.plan.outputs.runs_on != 'self-hosted' }}

      - name: Sync server + eval dependencies
        run: uv sync --frozen --extra test --extra eval

      - name: Install Ollama
        # Upstream installer script — touches /usr/local/bin and
        # /etc/systemd. Skipped on self-hosted because
        # terraform-gcp-eval-runner's startup.sh already installed
        # Ollama with an OLLAMA_CONTEXT_LENGTH=8192 systemd drop-in;
        # re-running the installer here would clobber the drop-in.
        if: needs.plan.outputs.runs_on != 'self-hosted'
        run: curl -fsSL https://ollama.com/install.sh | sh

      - name: Cache Ollama models
        # Model blobs live under ~/.ollama/models/blobs; 7B ~4.7 GB,
        # 14B ~9 GB. Cache keyed on model so each matrix row has its
        # own slot — no collisions, no unnecessary evictions.
        # Skipped on self-hosted: models are pre-pulled by
        # terraform-gcp-eval-runner startup.sh into the daemon's own
        # data dir (/usr/share/ollama/.ollama), and the actions/cache
        # restore would overlay ~/.ollama — a different path — with
        # whatever's in the ubuntu-latest cache slot, wasting I/O and
        # risking drift if the cached blobs are older than the VM's.
        if: needs.plan.outputs.runs_on != 'self-hosted'
        uses: actions/cache@v4
        with:
          path: ~/.ollama
          key: ollama-${{ matrix.model }}-v1

      - name: Start Ollama in the background
        # OLLAMA_CONTEXT_LENGTH=8192 bumps the default 4096-token
        # context so our ~4500-token tool catalog (22 tools × ~150
        # tokens desc + schemas + instructions preamble) fits
        # without silent tail truncation. Observed 2026-04-21 on
        # the GPU VM: default 4096 was chopping the later tools
        # from the catalog, and every chat completion came back
        # coherent-looking but with an empty tool_call — the model
        # literally didn't see those tools. qwen2.5 supports 128K
        # natively so 8K is well within spec.
        #
        # Check-first: on self-hosted runners (mode=agent in the
        # terraform sibling repo) Ollama is already running as a
        # systemd service on 127.0.0.1:11434 with the same context
        # length baked into a drop-in unit. Starting another serve
        # there would fail-fast on port bind and leave a noisy
        # "address already in use" in /tmp/ollama.log that gets
        # uploaded as an artefact on failure. Reuse the running
        # daemon instead.
        env:
          OLLAMA_CONTEXT_LENGTH: "8192"
        run: |
          if curl -sf http://127.0.0.1:11434/api/version > /dev/null; then
            echo "Ollama already running — reusing existing daemon."
            exit 0
          fi
          ollama serve > /tmp/ollama.log 2>&1 &
          for i in {1..30}; do
            if curl -sf http://127.0.0.1:11434/api/version > /dev/null; then
              echo "Ollama up."
              break
            fi
            sleep 1
          done

      - name: Pull model
        env:
          MODEL: ${{ matrix.model }}
        run: ollama pull "$MODEL"

      - name: Start mcp-weather over streamable HTTP
        # Same entrypoint as the Docker image — uv + server.py with
        # the streamable-http transport bound to loopback. No auth
        # because nothing else on the runner has network access to it.
        # `MCP_OUTPUT_SCHEMA` wires the A/B experiment into this row.
        # `MCP_ROUTER_MODE` wires the router A/B — `off` is the 28-tool
        # monolith, `fat_tools` / `fat_tools_lean` expose 4 fat
        # domain-tools (weather/geo/knowledge/web). The eval scorer
        # reads the same env to rewrite `expected_tool` into
        # `fat(action)` form when a fat mode is active.
        env:
          MCP_TRANSPORT: streamable-http
          MCP_HOST: 127.0.0.1
          MCP_PORT: "8000"
          MCP_OUTPUT_SCHEMA: ${{ matrix.schema }}
          MCP_DOCSTRING_MODE: ${{ matrix.docstring }}
          MCP_ROUTER_MODE: ${{ needs.plan.outputs.router_mode }}
        run: |
          nohup uv run server.py > /tmp/mcp.log 2>&1 &
          for i in {1..30}; do
            if curl -sf -X POST http://127.0.0.1:8000/mcp \
                 -H "Content-Type: application/json" \
                 -H "Accept: application/json, text/event-stream" \
                 -d '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2025-03-26","capabilities":{},"clientInfo":{"name":"eval","version":"0"}}}' \
                 > /dev/null; then
              echo "MCP up."
              break
            fi
            sleep 1
          done

      - name: Run eval
        id: eval
        env:
          OLLAMA_URL: http://127.0.0.1:11434
          MCP_URL: http://127.0.0.1:8000/mcp
          OLLAMA_MODEL: ${{ matrix.model }}
          # Router mode needs to match the MCP server's startup env so
          # the scorer rewrites expected tool names into `fat(action)`
          # form that matches the model's actual tool_calls.
          MCP_ROUTER_MODE: ${{ needs.plan.outputs.router_mode }}
          # Sharding env — the harness reads these to pick a
          # stride-N subset of cases.yaml so this row runs ~1/N of
          # the suite in parallel with its siblings.
          EVAL_CHUNK_INDEX: ${{ matrix.chunk }}
          EVAL_CHUNK_COUNT: ${{ needs.plan.outputs.chunk_count }}
          # Force line-buffered stdout so GitHub Actions streams each
          # per-case line to the step log as it happens. Without this
          # Python block-buffers through the `| tee` pipe and the step
          # looks like a black screen until the whole suite finishes.
          PYTHONUNBUFFERED: "1"
        # Tee'ing so the raw table lives in the log AND gets captured
        # for the step summary below.
        run: |
          set -o pipefail
          uv run python -u tests/integration/eval_tool_calling.py 2>&1 | tee /tmp/eval.out

      - name: Publish results to the job summary
        if: always()
        run: |
          {
            echo "### Tool-calling eval — ${{ matrix.model }} · outputSchema=${{ matrix.schema }} · docs=${{ matrix.docstring }} · chunk ${{ matrix.chunk }}/${{ needs.plan.outputs.chunk_count }}"
            echo ""
            echo '```'
            tail -60 /tmp/eval.out 2>/dev/null || echo "(no output captured)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      # Pre-compute the artifact name in bash — GHA's expression
      # language has NO `replace()` function (a previous attempt broke
      # the entire workflow: YAML was valid but GHA refused to parse
      # the expression, dropped all jobs, fell back to showing the
      # file path as the workflow "name"). `tr` does what we need
      # and runs always so the downstream step can reference the
      # output unconditionally via steps.artifact-name.outputs.value.
      - name: Compute sanitised artifact name
        id: artifact-name
        if: always()
        run: |
          safe_model="$(echo '${{ matrix.model }}' | tr ':' '-')"
          echo "value=eval-logs-${safe_model}-schema-${{ matrix.schema }}-docs-${{ matrix.docstring }}-chunk-${{ matrix.chunk }}" \
            >> "$GITHUB_OUTPUT"

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          # All four axes (model + schema + docstring + chunk) in the
          # name so the widest fanout doesn't collide on upload.
          # Colons from Ollama tag format (`qwen2.5:14b`) are
          # substituted to `-` by the compute step above; GHA's
          # artifact naming rules reject colon, slash, and several
          # other chars.
          name: ${{ steps.artifact-name.outputs.value }}
          path: |
            /tmp/eval.out
            /tmp/ollama.log
            /tmp/mcp.log
