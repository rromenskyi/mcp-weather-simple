name: eval tool-calling

# Integration test: pull a real Ollama model, attach the MCP tool
# catalog, walk `tests/integration/cases.yaml`, score tool-selection
# accuracy. Lives separately from the main `build` workflow because:
#
#   - Each model takes ~10-15 min on the 2-vCPU GHA runner (2-4 tok/s
#     inference, amortised over 40 prompts and a ~5 GB initial pull).
#   - It's not on the hot path: a failing tool-selection score is a
#     signal to re-tune tool docstrings / descriptions, not a blocker
#     for shipping code changes.
#
# Triggers:
#   - `workflow_dispatch`: manual button in the Actions tab. By default
#     runs the full matrix (qwen2.5:7b + qwen2.5:14b, in parallel); an
#     optional `model` input picks a single model for quick iteration.
#   - `schedule`: one nightly run at 03:00 UTC across the matrix to
#     catch regressions over time. The two runners fan out in parallel
#     so wall-clock is bounded by the slower model, not the sum.
#
# Usage guard: GitHub's Additional Product Terms allow Actions for
# "testing of the software project", which this clearly is. Matrix of
# two ~15-min jobs once a day = ~0.5 CPU-hours — well inside anyone's
# definition of proportional.

on:
  workflow_dispatch:
    inputs:
      model:
        description: >-
          Single model to evaluate (overrides the default matrix).
          Leave empty to run qwen2.5:7b + qwen2.5:14b in parallel.
        required: false
        default: ''
        type: choice
        options:
          - ''
          - qwen2.5:7b
          - qwen2.5-coder:7b
          - qwen2.5:14b
          - llama3.1:8b
          - llama3.2:3b
  schedule:
    # 03:00 UTC every day. Runs the full default matrix (both 7b and
    # 14b) so nightly trend data covers both sizes.
    - cron: "0 3 * * *"

# Per-model concurrency lock — two runs on the same model never stack
# up, but 7b and 14b can run side-by-side. Without the `-${{ matrix.model }}`
# suffix the older run would cancel the newer one mid-flight.
concurrency:
  group: eval-tool-calling-${{ github.event.inputs.model || 'matrix' }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  plan:
    # Compute the matrix dynamically:
    #   - workflow_dispatch with `model` set → just that one model
    #   - workflow_dispatch with `model` empty OR schedule → both 7b and 14b
    # This lets a single workflow file serve both the "I want to iterate
    # on descriptions fast, one model is enough" case and the "nightly
    # regression sweep across sizes" case.
    runs-on: ubuntu-latest
    outputs:
      models: ${{ steps.pick.outputs.models }}
    steps:
      - id: pick
        run: |
          single='${{ github.event.inputs.model }}'
          if [ -n "$single" ]; then
            echo "models=[\"$single\"]" >> "$GITHUB_OUTPUT"
          else
            echo 'models=["qwen2.5:7b","qwen2.5:14b"]' >> "$GITHUB_OUTPUT"
          fi

  eval:
    needs: plan
    name: eval / ${{ matrix.model }}
    runs-on: ubuntu-latest
    # Generous but bounded — a cold 14b run pulls ~9 GB and inferences
    # at ~1.5-2 tok/s (vs ~3-4 tok/s for 7b). 40 prompts × ~30 s each
    # + pull = ~25-30 min for 14b. 45 min gives headroom without
    # hanging forever.
    timeout-minutes: 45
    strategy:
      # A single model failure shouldn't cancel the sibling job — we
      # want the other row's numbers even if one regressed badly.
      fail-fast: false
      matrix:
        model: ${{ fromJSON(needs.plan.outputs.models) }}

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync server + eval dependencies
        run: uv sync --frozen --extra test --extra eval

      - name: Install Ollama
        # Upstream installer script — touches /usr/local/bin and
        # /etc/systemd. On ephemeral GHA runners that's fine; on a
        # self-hosted runner pin the version.
        run: curl -fsSL https://ollama.com/install.sh | sh

      - name: Cache Ollama models
        # Model blobs live under ~/.ollama/models/blobs; 7B ~4.7 GB,
        # 14B ~9 GB. Cache keyed on model so each matrix row has its
        # own slot — no collisions, no unnecessary evictions.
        uses: actions/cache@v4
        with:
          path: ~/.ollama
          key: ollama-${{ matrix.model }}-v1

      - name: Start Ollama in the background
        run: |
          ollama serve > /tmp/ollama.log 2>&1 &
          for i in {1..30}; do
            if curl -sf http://127.0.0.1:11434/api/version > /dev/null; then
              echo "Ollama up."
              break
            fi
            sleep 1
          done

      - name: Pull model
        env:
          MODEL: ${{ matrix.model }}
        run: ollama pull "$MODEL"

      - name: Start mcp-weather over streamable HTTP
        # Same entrypoint as the Docker image — uv + server.py with
        # the streamable-http transport bound to loopback. No auth
        # because nothing else on the runner has network access to it.
        env:
          MCP_TRANSPORT: streamable-http
          MCP_HOST: 127.0.0.1
          MCP_PORT: "8000"
        run: |
          nohup uv run server.py > /tmp/mcp.log 2>&1 &
          for i in {1..30}; do
            if curl -sf -X POST http://127.0.0.1:8000/mcp \
                 -H "Content-Type: application/json" \
                 -H "Accept: application/json, text/event-stream" \
                 -d '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2025-03-26","capabilities":{},"clientInfo":{"name":"eval","version":"0"}}}' \
                 > /dev/null; then
              echo "MCP up."
              break
            fi
            sleep 1
          done

      - name: Run eval
        id: eval
        env:
          OLLAMA_URL: http://127.0.0.1:11434
          MCP_URL: http://127.0.0.1:8000/mcp
          OLLAMA_MODEL: ${{ matrix.model }}
        # Tee'ing so the raw table lives in the log AND gets captured
        # for the step summary below.
        run: |
          set -o pipefail
          uv run python tests/integration/eval_tool_calling.py 2>&1 | tee /tmp/eval.out

      - name: Publish results to the job summary
        if: always()
        run: |
          {
            echo "### Tool-calling eval — ${{ matrix.model }}"
            echo ""
            echo '```'
            tail -60 /tmp/eval.out 2>/dev/null || echo "(no output captured)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          # Artifact name must be unique across matrix rows, otherwise
          # GHA refuses the upload with "artifact already exists".
          name: eval-logs-${{ matrix.model }}
          path: |
            /tmp/eval.out
            /tmp/ollama.log
            /tmp/mcp.log
