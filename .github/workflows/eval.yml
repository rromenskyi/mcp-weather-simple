name: eval tool-calling

# Integration test: pull a real Ollama model, attach the MCP tool
# catalog, walk `tests/integration/cases.yaml`, score tool-selection
# accuracy. Lives separately from the main `build` workflow because:
#
#   - Each model takes ~10-15 min on the 2-vCPU GHA runner (2-4 tok/s
#     inference, amortised over 40 prompts and a ~5 GB initial pull).
#   - It's not on the hot path: a failing tool-selection score is a
#     signal to re-tune tool docstrings / descriptions, not a blocker
#     for shipping code changes.
#
# Triggers:
#   - `workflow_dispatch`: manual button in the Actions tab. By default
#     runs the full matrix (qwen2.5:7b + qwen2.5:14b, in parallel); an
#     optional `model` input picks a single model for quick iteration.
#   - `schedule`: one nightly run at 03:00 UTC across the matrix to
#     catch regressions over time. The two runners fan out in parallel
#     so wall-clock is bounded by the slower model, not the sum.
#
# Usage guard: GitHub's Additional Product Terms allow Actions for
# "testing of the software project", which this clearly is. Matrix of
# two ~15-min jobs once a day = ~0.5 CPU-hours — well inside anyone's
# definition of proportional.

on:
  workflow_dispatch:
    inputs:
      model:
        description: >-
          Single model to evaluate (overrides the default matrix).
          Leave empty to run qwen2.5:7b + qwen2.5:14b in parallel.
        required: false
        default: ''
        type: choice
        options:
          - ''
          - qwen2.5:7b
          - qwen2.5-coder:7b
          - qwen2.5:14b
          - llama3.1:8b
          - llama3.2:3b
      output_schema:
        description: >-
          outputSchema A/B experiment. Off = current (no spec 2025-06-18
          outputSchema declared); on = every tool advertises the
          envelope schema; both = fan out matrix to run each model
          twice (on + off) so per-family hit-rate deltas and latency
          deltas are visible on the same PR.
        required: false
        default: 'off'
        type: choice
        options:
          - 'off'
          - 'on'
          - 'both'
      chunk_count:
        description: >-
          Shard the 40-prompt suite across N parallel runners. 1 = one
          row runs every case (the 2-vCPU 14b path bumps the 45-min
          ceiling). 2 = default; 14b finishes ~25 min per row. 4 =
          aggressive split for when other axes (output_schema=both)
          also fan out — e.g. 2 models × 2 schemas × 4 chunks = 16
          rows, still under the 20-concurrent-job free-tier cap.
        required: false
        default: '2'
        type: choice
        options:
          - '1'
          - '2'
          - '4'
  schedule:
    # 03:00 UTC every day. Runs the full default matrix (both 7b and
    # 14b) so nightly trend data covers both sizes. Schedule uses the
    # default `output_schema=off` so nightly-trend numbers stay
    # comparable over time — flip to `on`/`both` via workflow_dispatch
    # when you want to measure the experiment.
    - cron: "0 3 * * *"

# Concurrency lock is per (model × schema) — chunk index is NOT in
# the key so two re-runs of the same (model, schema) combo can't
# stack up, but (7b,off) runs independently from (14b,on) etc.
concurrency:
  group: >-
    eval-tool-calling-${{ github.event.inputs.model || 'matrix' }}-${{ github.event.inputs.output_schema || 'off' }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  plan:
    # Compute the matrix dynamically on TWO axes:
    #   - model      → which Ollama model to pull (workflow_dispatch
    #                  picker or default 7b+14b)
    #   - schema     → the outputSchema A/B experiment dimension
    #                  (off/on/both); `both` fans out so per-row
    #                  deltas are visible on the same PR
    # Total fanout is |models| × |schemas| parallel jobs. Each gets
    # its own GHA runner so wall-clock is bounded by the slowest row,
    # not the sum.
    runs-on: ubuntu-latest
    outputs:
      models: ${{ steps.pick.outputs.models }}
      schemas: ${{ steps.pick.outputs.schemas }}
      chunks: ${{ steps.pick.outputs.chunks }}
      chunk_count: ${{ steps.pick.outputs.chunk_count }}
    steps:
      - id: pick
        run: |
          single='${{ github.event.inputs.model }}'
          if [ -n "$single" ]; then
            echo "models=[\"$single\"]" >> "$GITHUB_OUTPUT"
          else
            echo 'models=["qwen2.5:7b","qwen2.5:14b"]' >> "$GITHUB_OUTPUT"
          fi
          schema='${{ github.event.inputs.output_schema || 'off' }}'
          if [ "$schema" = "both" ]; then
            echo 'schemas=["off","on"]' >> "$GITHUB_OUTPUT"
          else
            echo "schemas=[\"$schema\"]" >> "$GITHUB_OUTPUT"
          fi
          # Chunk count defaults to 2 (schedule default + explicit).
          # Build the indices array inline so the eval job can use it
          # straight via fromJSON with matrix expansion.
          count='${{ github.event.inputs.chunk_count || '2' }}'
          case "$count" in
            1) echo 'chunks=["0"]' >> "$GITHUB_OUTPUT" ;;
            2) echo 'chunks=["0","1"]' >> "$GITHUB_OUTPUT" ;;
            4) echo 'chunks=["0","1","2","3"]' >> "$GITHUB_OUTPUT" ;;
            *) echo "Unsupported chunk_count=$count" >&2 ; exit 1 ;;
          esac
          echo "chunk_count=$count" >> "$GITHUB_OUTPUT"

  eval:
    needs: plan
    name: eval / ${{ matrix.model }} / outputSchema=${{ matrix.schema }} / chunk ${{ matrix.chunk }}
    runs-on: ubuntu-latest
    # Generous but bounded. With the default chunk_count=2, 14b on
    # CPU now runs ~20 cases + warm-up + model pull ≈ 20-25 min per
    # row, comfortably under the ceiling. chunk_count=1 puts full
    # 40 cases back on one row and needs the headroom the 45-min cap
    # provides; anything above 4 chunks won't fit the 20-job
    # free-tier concurrent cap when combined with `output_schema=both`.
    timeout-minutes: 45
    strategy:
      # A single row failure shouldn't cancel its siblings — we want
      # the other axis's numbers even if one regressed badly.
      fail-fast: false
      matrix:
        model: ${{ fromJSON(needs.plan.outputs.models) }}
        schema: ${{ fromJSON(needs.plan.outputs.schemas) }}
        chunk: ${{ fromJSON(needs.plan.outputs.chunks) }}

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync server + eval dependencies
        run: uv sync --frozen --extra test --extra eval

      - name: Install Ollama
        # Upstream installer script — touches /usr/local/bin and
        # /etc/systemd. On ephemeral GHA runners that's fine; on a
        # self-hosted runner pin the version.
        run: curl -fsSL https://ollama.com/install.sh | sh

      - name: Cache Ollama models
        # Model blobs live under ~/.ollama/models/blobs; 7B ~4.7 GB,
        # 14B ~9 GB. Cache keyed on model so each matrix row has its
        # own slot — no collisions, no unnecessary evictions.
        uses: actions/cache@v4
        with:
          path: ~/.ollama
          key: ollama-${{ matrix.model }}-v1

      - name: Start Ollama in the background
        run: |
          ollama serve > /tmp/ollama.log 2>&1 &
          for i in {1..30}; do
            if curl -sf http://127.0.0.1:11434/api/version > /dev/null; then
              echo "Ollama up."
              break
            fi
            sleep 1
          done

      - name: Pull model
        env:
          MODEL: ${{ matrix.model }}
        run: ollama pull "$MODEL"

      - name: Start mcp-weather over streamable HTTP
        # Same entrypoint as the Docker image — uv + server.py with
        # the streamable-http transport bound to loopback. No auth
        # because nothing else on the runner has network access to it.
        # `MCP_OUTPUT_SCHEMA` wires the A/B experiment into this row.
        env:
          MCP_TRANSPORT: streamable-http
          MCP_HOST: 127.0.0.1
          MCP_PORT: "8000"
          MCP_OUTPUT_SCHEMA: ${{ matrix.schema }}
        run: |
          nohup uv run server.py > /tmp/mcp.log 2>&1 &
          for i in {1..30}; do
            if curl -sf -X POST http://127.0.0.1:8000/mcp \
                 -H "Content-Type: application/json" \
                 -H "Accept: application/json, text/event-stream" \
                 -d '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2025-03-26","capabilities":{},"clientInfo":{"name":"eval","version":"0"}}}' \
                 > /dev/null; then
              echo "MCP up."
              break
            fi
            sleep 1
          done

      - name: Run eval
        id: eval
        env:
          OLLAMA_URL: http://127.0.0.1:11434
          MCP_URL: http://127.0.0.1:8000/mcp
          OLLAMA_MODEL: ${{ matrix.model }}
          # Sharding env — the harness reads these to pick a
          # stride-N subset of cases.yaml so this row runs ~1/N of
          # the suite in parallel with its siblings.
          EVAL_CHUNK_INDEX: ${{ matrix.chunk }}
          EVAL_CHUNK_COUNT: ${{ needs.plan.outputs.chunk_count }}
          # Force line-buffered stdout so GitHub Actions streams each
          # per-case line to the step log as it happens. Without this
          # Python block-buffers through the `| tee` pipe and the step
          # looks like a black screen until the whole suite finishes.
          PYTHONUNBUFFERED: "1"
        # Tee'ing so the raw table lives in the log AND gets captured
        # for the step summary below.
        run: |
          set -o pipefail
          uv run python -u tests/integration/eval_tool_calling.py 2>&1 | tee /tmp/eval.out

      - name: Publish results to the job summary
        if: always()
        run: |
          {
            echo "### Tool-calling eval — ${{ matrix.model }} · outputSchema=${{ matrix.schema }} · chunk ${{ matrix.chunk }}/${{ needs.plan.outputs.chunk_count }}"
            echo ""
            echo '```'
            tail -60 /tmp/eval.out 2>/dev/null || echo "(no output captured)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          # Artifact name must be unique across all matrix rows,
          # otherwise GHA refuses the upload with "artifact already
          # exists". All three axes (model + schema + chunk) in the
          # name so the widest fanout (2×2×4 = 16 rows) doesn't
          # collide.
          name: eval-logs-${{ matrix.model }}-schema-${{ matrix.schema }}-chunk-${{ matrix.chunk }}
          path: |
            /tmp/eval.out
            /tmp/ollama.log
            /tmp/mcp.log
