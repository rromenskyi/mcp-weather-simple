name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python:
    name: python / uv sync + import
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync dependencies (frozen)
        run: uv sync --frozen

      - name: Import server (smoke test)
        run: uv run python -c "import server; print(server.mcp.name)"

  docker:
    name: docker / build image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: mcp-weather-simple:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test container
        run: |
          docker run -d --name mcp -p 8000:8000 mcp-weather-simple:ci
          for i in {1..20}; do
            if curl -sf -o /dev/null -X POST http://127.0.0.1:8000/mcp \
                 -H 'Content-Type: application/json' \
                 -H 'Accept: application/json, text/event-stream' \
                 -d '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2025-03-26","capabilities":{},"clientInfo":{"name":"ci","version":"0"}}}'; then
              echo "server responded"
              docker logs mcp
              exit 0
            fi
            sleep 1
          done
          echo "server did not respond in time"
          docker logs mcp
          exit 1
